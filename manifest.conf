# Declarative source manifest for dotfiles.
#
# Sections are profiles and they are cumulative: [standard] includes everything
# in [minimal], and [full] includes everything in [standard]. The "all" profile
# selects every entry.
#
# Entry columns (whitespace-separated):
#   name        unique entry id
#   kind        "tree" (link every non-ignored file under src) | "file" (single file)
#   src         repo-relative source path
#   dest        destination; {XDG_CONFIG}=~/.config (always; not $XDG_CONFIG_HOME),
#               {HOME}=~, {BIN}=~/.local/bin
#   platforms   optional; "all" (default) or comma-separated subset of macos,ubuntu
#
# A file entry whose src lives under a tree entry's src belongs to that tree's
# component and shadows itself out of the tree's file set.

[minimal]
git           tree  config/git            {XDG_CONFIG}/git
zsh           tree  config/zsh            {XDG_CONFIG}/zsh
zsh-env       file  config/zsh/zshenv     {HOME}/.zshenv
tmux          tree  config/tmux           {XDG_CONFIG}/tmux
bin           tree  bin                   {BIN}

[standard]
nvim          tree  config/nvim           {XDG_CONFIG}/nvim
bat           tree  config/bat            {XDG_CONFIG}/bat
python        tree  config/python         {XDG_CONFIG}/python
ripgrep       tree  config/ripgrep        {XDG_CONFIG}/ripgrep

[full]
clang-format  file  config/clang-format   {HOME}/.clang-format
curl          file  config/.curlrc        {HOME}/.curlrc
lldb          tree  config/lldb           {XDG_CONFIG}/lldb       macos
lldb-init     file  config/lldb/.lldbinit  {HOME}/.lldbinit      macos
karabiner     tree  config/karabiner      {XDG_CONFIG}/karabiner  macos
kitty         tree  config/kitty          {XDG_CONFIG}/kitty      macos
