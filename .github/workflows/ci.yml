name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # -S error now; drop to warning once the ~18 legacy warnings are fixed
      - name: shellcheck (error severity)
        run: |
          shellcheck -S error bootstrap.sh install/*.sh bin/dotfiles tests/*.sh

  lua-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install lua
        run: sudo apt-get update && sudo apt-get install -y lua5.3
      - name: luac -p on nvim config
        run: |
          find config/nvim -name '*.lua' -print0 | xargs -0 -n1 luac5.3 -p

  zsh-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: zsh -n on zsh config
        run: |
          find config/zsh -name '*.zsh' -print0 | xargs -0 -n1 zsh -n
          zsh -n config/zsh/zshenv config/zsh/.zshrc config/zsh/.zprofile

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run bootstrap tests
        run: make test
