name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck (shebang-discovered, warning severity)
        run: make .lint-shell

  lua-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install lua
        run: sudo apt-get update && sudo apt-get install -y lua5.3
      - name: Install StyLua
        # default features parse Lua 5.1 only; the config uses goto (5.2+)
        run: cargo install stylua --version 2.5.2 --locked --features lua52,lua53,lua54
      - name: Check Neovim Lua formatting
        run: stylua --check config/nvim
      - name: luac -p on nvim config
        run: |
          find config/nvim -name '*.lua' -print0 | xargs -0 -n1 luac5.3 -p

  zsh-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: zsh -n on zsh config
        run: |
          find config/zsh -name '*.zsh' -print0 | xargs -0 -n1 zsh -n
          zsh -n config/zsh/zshenv config/zsh/.zshrc config/zsh/.zprofile
          zsh -n config/macos/harden.zsh
          # extensionless autoloaded functions and completions are zsh too
          find config/zsh/functions config/zsh/completions -type f -print0 | xargs -0 -n1 zsh -n
