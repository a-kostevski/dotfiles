name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck (shebang-discovered, warning severity)
        run: make .lint-shell

  lua-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install lua
        run: sudo apt-get update && sudo apt-get install -y lua5.3
      - name: Install StyLua
        # default features parse Lua 5.1 only; the config uses goto (5.2+)
        run: cargo install stylua --version 2.5.2 --locked --features lua52,lua53,lua54
      - name: Check Neovim Lua formatting
        run: stylua --check config/nvim
      - name: luac -p on nvim config
        run: |
          find config/nvim -name '*.lua' -print0 | xargs -0 -n1 luac5.3 -p

  zsh-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: zsh -n on zsh config
        run: |
          find config/zsh -name '*.zsh' -print0 | xargs -0 -n1 zsh -n
          zsh -n config/zsh/zshenv config/zsh/.zshrc config/zsh/.zprofile
          zsh -n config/macos/harden.zsh config/macos/defaults.zsh
          # extensionless autoloaded functions and completions are zsh too
          find config/zsh/functions config/zsh/completions -type f -print0 | xargs -0 -n1 zsh -n

  bash-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n on bash config
        run: |
          find config/bash -type f \( -name '*.bash' -o -name 'bash_profile' -o -name 'bashrc' \) -print0 |
            xargs -0 -n1 bash -n
      - name: shellcheck on bash config (warning severity)
        run: |
          find config/bash -type f \( -name '*.bash' -o -name 'bash_profile' -o -name 'bashrc' \) -print0 |
            xargs -0 shellcheck -S warning --shell=bash

  # Exercise the linking engine itself: dry-run, a real link into an isolated
  # HOME, status verification, and the stored-profile contract (a flagless
  # re-run must keep — not clobber — the previously linked profile).
  bootstrap:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install bash 4+ (macOS ships 3.2)
        if: runner.os == 'macOS'
        run: brew install bash
      - name: Dry-run link (full profile)
        run: ./bootstrap.sh --dry-run --profile full --verbose
      - name: Real link into temp HOME (standard profile)
        run: |
          home="$RUNNER_TEMP/bootstrap-home"
          mkdir -p "$home"
          HOME="$home" ./bootstrap.sh --profile standard
          test -L "$home/.zshenv"
          # nvim is a tree entry: the directory is real, its files are links
          test "$(readlink "$home/.config/nvim/init.lua")" = "$(pwd -P)/config/nvim/init.lua"
          HOME="$home" ./bin/dotfiles status --summary
      - name: Flagless re-run keeps the stored profile
        run: |
          home="$RUNNER_TEMP/bootstrap-home"
          HOME="$home" ./bootstrap.sh
          test "$(cat "$home/.config/.dotfiles-profile")" = "standard"
          HOME="$home" ./bin/dotfiles status --summary
