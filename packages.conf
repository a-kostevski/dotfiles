# Declarative package manifest.
#
# Sections are tiers and they are cumulative: [standard] includes everything
# in [minimal], and [full] includes everything in [standard].
#
# Entry columns (whitespace-separated, "-" = not available / skip):
#   name   unique id / summary label
#   brew   macOS Homebrew formula
#   cask   macOS Homebrew cask
#   apt    Ubuntu apt package ("-" = skip / handled by an imperative extra)

[minimal]
# name                        brew                cask  apt
git                           git                 -     git
git-lfs                       git-lfs             -     git-lfs
curl                          curl                -     curl
wget                          wget                -     wget
zsh                           zsh                 -     zsh
tmux                          tmux                -     tmux

[standard]
# name                        brew                cask  apt
