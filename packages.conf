gnu-sed                       gnu-sed             -     -
grep                          grep                -     -
ripgrep                       ripgrep             -     ripgrep
fd                            fd                  -     fd-find
fzf                           fzf                 -     fzf
jq                            jq                  -     jq
tree                          tree                -     tree
bat                           bat                 -     bat
htop                          htop                -     htop
unzip                         -                   -     unzip
xclip                         -                   -     xclip
python                        python              -     python3-pip
node                          node                -     -
# neovim (ubuntu via archive extra) and eza (ubuntu via apt-repo extra) carry
# empty apt on purpose.
neovim                        neovim              -     -
eza                           eza                 -     -
uv                            uv                  -     -

