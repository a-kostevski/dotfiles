# vim:fileencoding=utf-8:ft=kitty:foldmethod=marker
editor /opt/homebrew/bin/nvim

# Font
# font_family family="FiraCode Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 12
symbol_map U+23FB-U+23FE,U+2665,U+26A1,U+2B58,U+E000-U+E00A,U+E0A0-U+E0A3,U+E0B0-U+E0C8,U+E0CA,U+E0CC-U+E0D2,U+E0D4,U+E200-U+E2A9,U+E300-U+E3E3,U+E5FA-U+E634,U+E700-U+E7C5,U+EA60-U+EBEB,U+F000-U+F2E0,U+F300-U+F32F,U+F400-U+F4A9,U+F500-U+F8FF Symbols Nerd Font Mono

#Layouts
enabled_layouts splits:split_axis=horizontal,stack

# Misc
scrollback_lines 10000
touch_scroll_multiplier 2.0
copy_on_select yes
enable_audio_bell no
macos_titlebar_color background

cursor_shape beam

# Tabs
tab_bar_style powerline
tab_bar_background #15161e
tab_bar_margin_height 10.0 0.0
tab_separator " "
tab_title_template "{title}{fmt.bold}{'  ' if num_windows > 1 and layout_name == 'stack' else ''}"


# Windows
window_margin_width 4 4 16 4
single_window_margin_width 0
inactive_text_alpha 0.85
window_padding_width 5
hide_window_decorations 1
remember_window_size  yes
macos_show_window_title_in none
confirm_os_window_close 0
startup_session session.conf
background_opacity 0.97
dynamic_background_opacity yes

# Remote control (required by smart-splits.nvim)
allow_remote_control yes
# {kitty_pid} keeps sockets unique so multiple instances don't collide
listen_on unix:/tmp/mykitty-{kitty_pid}

# Keys
kitty_mod cmd+shift
map kitty_mod+e show_kitty_env_vars

map f1 launch --stdin-source=@screen_scrollback less

# Unset the mapping to pass the keys to neovim
map --when-focus-on var:IS_NVIM alt+j
map --when-focus-on var:IS_NVIM alt+k
map --when-focus-on var:IS_NVIM alt+h
map --when-focus-on var:IS_NVIM alt+l

map alt+h neighboring_window left
map alt+j neighboring_window bottom
map alt+k neighboring_window top
map alt+l neighboring_window right

map kitty_mod+l next_tab
map kitty_mod+h previous_tab
map kitty_mod+m toggle_layout stack
map kitty_mod+z toggle_layout stack
map kitty_mod+enter launch --location=split --cwd=current
map kitty_mod+\ launch --location=vsplit    --cwd=current
map kitty_mod+minus launch --location=hsplit --cwd=current
map kitty_mod+left neighboring_window left
map kitty_mod+right neighboring_window right
map kitty_mod+up neighboring_window up
map kitty_mod+down neighboring_window down
map kitty_mod+alt+left resize_window wider
map kitty_mod+alt+right resize_window narrower
map kitty_mod+alt+up resize_window taller
map kitty_mod+alt+down resize_window shorter
map kitty_mod+alt+h move_window left
map kitty_mod+alt+j move_window bottom
map kitty_mod+alt+k move_window top
map kitty_mod+alt+l move_window right
map kitty_mod+space focus_visible_window
map kitty_mod+alt+m swap_with_window
map kitty_mod+b layout_action rotate
map kitty_mod+r show_scrollback

include themes/tokyonight_moon.conf

