set-option -g mouse on

set -g escape-time 10

# tmux-256color gives correct terminfo inside tmux (italics, etc.);
# the override enables 24-bit color passthrough for kitty
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-kitty:Tc"

# Forward terminal focus events so Neovim's FocusGained/FocusLost
# (autoread/autosave) fire while running inside tmux.
set -g focus-events on

set -g history-limit 50000

setw -g mode-keys vi

set -g renumber-windows on

